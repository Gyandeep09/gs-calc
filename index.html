<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>G-Calc | Advanced 3D Calculator</title>
  <meta name="description" content="Perform precise calculations with a visually striking 3D calculator. Developed by Gyandeep Dehingia.">
  <style>
    :root {
      --bg: #070503;
      --glow: rgba(0, 255, 65, 0.4);
      --screen: #111;
      --text: #00ff41;
      --btn-bg: #1a1a1a;
      --btn-hover: #333;
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at center, #120f08 0%, var(--bg) 100%);
      font-family: 'Courier New', Courier, monospace;
      color: #fff;
    }

    .info-banner {
      margin-bottom: 2rem;
      text-align: center;
    }

    .info-banner h1 {
      margin: 0 0 10px 0;
      font-size: 2rem;
      letter-spacing: 2px;
      color: var(--text);
      text-shadow: 0 0 10px var(--glow);
    }

    .info-banner a {
      color: #fff;
      text-decoration: none;
      border: 1px solid var(--text);
      padding: 8px 16px;
      border-radius: 4px;
      background: rgba(0,255,65,0.05);
      transition: all 0.3s ease;
    }

    .info-banner a:hover {
      background: var(--glow);
      box-shadow: 0 0 15px var(--glow);
    }

    .calculator {
      background: #0a0a0a;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 
        0 20px 50px rgba(0,0,0,0.8),
        inset 0 0 0 1px rgba(255,255,255,0.05),
        0 0 20px rgba(0,255,65,0.1);
      width: 320px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .screen {
      background: var(--screen);
      border: 2px solid #222;
      border-radius: 8px;
      padding: 20px;
      text-align: right;
      font-size: 2rem;
      color: var(--text);
      box-shadow: inset 0 0 15px rgba(0,0,0,1);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      background: var(--btn-bg);
      border: 1px solid #222;
      color: #ddd;
      padding: 15px 0;
      font-size: 1.2rem;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.1s;
      box-shadow: 0 4px 0 #000;
    }

    button:active {
      transform: translateY(4px);
      box-shadow: 0 0 0 #000;
    }

    button.op {
      color: var(--text);
      border-color: rgba(0,255,65,0.2);
    }

    button.equal {
      background: rgba(0,255,65,0.1);
      color: var(--text);
      border-color: var(--glow);
      grid-column: span 2;
    }
  </style>
</head>
<body>

  <div class="info-banner">
    <h1>G-CALC</h1>
    <a href="https://g-calc-six.vercel.app/" target="_blank">Launch Full Application</a>
  </div>

  <div class="calculator">
    <div class="screen" id="display">0</div>
    <div class="grid">
      <button class="op" onclick="window.calc.clear()">AC</button>
      <button class="op" onclick="window.calc.appendOperator('/')">÷</button>
      <button class="op" onclick="window.calc.appendOperator('*')">×</button>
      <button class="op" onclick="window.calc.appendOperator('-')">−</button>
      
      <button onclick="window.calc.appendNumber('7')">7</button>
      <button onclick="window.calc.appendNumber('8')">8</button>
      <button onclick="window.calc.appendNumber('9')">9</button>
      <button class="op" onclick="window.calc.appendOperator('+')" style="grid-row: span 2; height: 100%;">+</button>
      
      <button onclick="window.calc.appendNumber('4')">4</button>
      <button onclick="window.calc.appendNumber('5')">5</button>
      <button onclick="window.calc.appendNumber('6')">6</button>
      
      <button onclick="window.calc.appendNumber('1')">1</button>
      <button onclick="window.calc.appendNumber('2')">2</button>
      <button onclick="window.calc.appendNumber('3')">3</button>
      <button class="equal" onclick="window.calc.calculate()" style="grid-row: span 2; height: 100%;">=</button>
      
      <button onclick="window.calc.appendNumber('0')" style="grid-column: span 2;">0</button>
      <button onclick="window.calc.appendNumber('.')">.</button>
    </div>
  </div>

  <script src="dist/calculator.js"></script>
</body>
</html>
